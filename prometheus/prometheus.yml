global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "ml-analyzer"
    metrics_path: /metrics
    static_configs:
      - targets: ["ml-analyzer:8001"]

  - job_name: "coach-agent"
    metrics_path: /metrics
    static_configs:
      - targets: ["coach-agent:8000"]

  - job_name: "api-gateway"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:8080"]
