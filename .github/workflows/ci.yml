name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  ml-analyzer-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ml-analyzer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Add uv to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Install deps
        run: uv sync --extra dev
      - name: Run tests
        run: uv run pytest -v

  coach-agent-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/coach-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Add uv to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Install deps
        run: uv sync --extra dev
      - name: Run tests
        run: uv run pytest -v

  api-gateway-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Run tests
        run: mvn -B test

  web-ui-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/web-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deps
        run: npm install
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  compose-build:
    runs-on: ubuntu-latest
    needs: [ml-analyzer-tests, coach-agent-tests, api-gateway-tests, web-ui-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Docker Compose Build
        env:
          APP_JWT_SECRET: CiBuildSecretKeyForJwtSigning_AtLeast32Chars
        run: docker compose build
