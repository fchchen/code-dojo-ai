server:
  port: 8080

spring:
  application:
    name: api-gateway

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

app:
  auth:
    demo-rate-limit-per-minute: 30
  jwt:
    secret: ${APP_JWT_SECRET:}
    expiration-seconds: 3600
  services:
    coach-agent-url: http://coach-agent:8000
    ml-analyzer-url: http://ml-analyzer:8001
